<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MOBMOBS">
    <meta name="theme-color" content="#87b9e0">
    <link rel="manifest" href="manifest.json">
    <title>MOBMOBS - Track Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer"></div>

    <!-- Top-left status: FPS + build/patch number -->
    <div id="topInfo">
        <span class="ti-fps"><b id="fpsValue">--</b> FPS</span>
        <span class="ti-build" id="buildValue">v0.0.0</span>
    </div>

    <!-- Heads-up display -->
    <div id="hud">
        <div class="hud-row">
            <span class="hud-label">POS</span>
            <span id="posValue">1 / 4</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">LAP</span>
            <span id="lapValue">1 / 3</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">TIME</span>
            <span id="timeValue">0:00.00</span>
        </div>
        <div class="hud-row">
            <span class="hud-label">BEST</span>
            <span id="bestValue">--:--.--</span>
        </div>
    </div>

    <!-- Speedometer (bottom-center) -->
    <div id="speedo">
        <span id="speedValue">0</span>
        <span class="hud-unit">KM/H</span>
        <div id="boostBar"><div id="boostFill"></div></div>
    </div>

    <!-- Center messages (countdown / boost / finish) -->
    <div id="centerMessage"></div>

    <!-- Steering + throttle joystick (left): push to steer, push up to throttle -->
    <div id="joystick" class="joystick">
        <div class="joystick-base"></div>
        <div class="joystick-stick"></div>
    </div>

    <!-- Track select / menu button (top-left of controls) -->
    <button id="menuBtn" aria-label="Tracks">≡ TRACKS</button>

    <!-- Fullscreen toggle (top-right) -->
    <button id="fsBtn" aria-label="Fullscreen">⛶</button>

    <!-- Install-to-home tip (iOS fullscreen) -->
    <div id="fsTip">
        For true fullscreen on iPhone: tap <b>Share</b> &#8593; then
        <b>Add to Home Screen</b>, and open it from the icon. <span class="tip-x">(tap to hide)</span>
    </div>

    <!-- Ability buttons (right) -->
    <div id="abilities">
        <button id="nitroBtn" class="ability ability-nitro">
            <span id="nitroFill"></span>
            <span class="ability-label">NITRO</span>
        </button>
    </div>

    <!-- Track-select menu -->
    <div id="menu" class="menu">
        <div class="menu-panel">
            <h1>MOBMOBS</h1>
            <p class="menu-sub">Choose your track</p>
            <div id="trackList" class="track-list"></div>
        </div>
    </div>

    <!-- Rotate-to-landscape hint (portrait only, tap to dismiss) -->
    <div id="rotateHint">
        <span class="rotate-icon">↻</span>
        <span>Rotate to landscape for the best view &middot; tap to hide</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
