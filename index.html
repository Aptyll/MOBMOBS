<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MOBMOBS">
    <meta name="theme-color" content="#87b9e0">
    <link rel="manifest" href="manifest.json">
    <title>MOBMOBS - Track Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer"></div>

    <!-- Debug info: FPS + build/patch — hidden by default, toggled in settings -->
    <div id="topInfo">
        <span class="ti-fps"><b id="fpsValue">--</b> FPS</span>
        <span class="ti-build" id="buildValue">v0.0.0</span>
    </div>

    <!-- Top speed HUD (Asphalt-style): speed bar + big MPH, POS left, LAP right -->
    <div id="speedHud">
        <div class="sh-bar" id="speedBar">
            <div class="sh-bar-grad" id="speedGrad"></div>
            <div class="sh-bar-streak" id="speedStreak"></div>
        </div>
        <div class="sh-main">
            <div class="sh-side">
                <span class="sh-side-label">POS</span>
                <span class="sh-side-val" id="posValue">1/4</span>
            </div>
            <div class="sh-speed">
                <span class="sh-mph" id="speedValue">0</span>
                <span class="sh-unit">MPH</span>
            </div>
            <div class="sh-side sh-side-right">
                <span class="sh-side-label">LAP</span>
                <span class="sh-side-val" id="lapValue">1/3</span>
                <span class="sh-race-time" id="raceTimeValue">0:00</span>
            </div>
        </div>
    </div>

    <!-- Mini-map (top-right): course outline + racer positions -->
    <canvas id="minimap"></canvas>

    <!-- Center messages (countdown / boost) -->
    <div id="centerMessage"></div>

    <!-- Finish screen: just the place ordinal, no other UI -->
    <div id="finishOverlay"><span id="finishOrd"></span></div>

    <!-- Steering + throttle joystick (left): push to steer, push up to throttle -->
    <div id="joystick" class="joystick">
        <div class="joystick-base"></div>
        <div class="joystick-stick"></div>
    </div>

    <!-- Settings button (top-right) -->
    <button id="menuBtn" aria-label="Settings">⚙ SETTINGS</button>

    <!-- Ability buttons (right) -->
    <div id="abilities">
        <button id="boostBtn" class="ability ability-boost">
            <span id="boostFill"></span>
            <span class="ability-label">BOOST</span>
        </button>
    </div>

    <!-- Home / main menu -->
    <div id="home" class="menu">
        <div class="menu-panel">
            <h1>MOBMOBS</h1>
            <p class="menu-sub">Arcade Track Racer</p>

            <div class="profile-card">
                <div class="pc-avatar" id="profileAvatar">P</div>
                <div class="pc-info">
                    <input id="nameInput" class="pc-name" maxlength="14" placeholder="Player" />
                    <div class="pc-stats">
                        <span><b id="statRaces">0</b> races</span>
                        <span><b id="statWins">0</b> wins</span>
                        <span>best <b id="statBest">--:--.--</b></span>
                    </div>
                </div>
            </div>

            <div class="home-actions">
                <button class="btn-primary" id="playBtn">PLAY</button>
                <button class="btn-secondary" id="garageBtn">GARAGE</button>
            </div>
        </div>
    </div>

    <!-- Garage / car customization -->
    <div id="garage" class="menu">
        <div class="menu-panel garage-panel">
            <h1 class="title-sm garage-title">GARAGE</h1>

            <div class="garage-preview">
                <canvas id="garageCanvas"></canvas>
                <span class="garage-hint">drag to spin</span>
            </div>

            <div class="garage-opts">
                <p class="garage-label">Body</p>
                <div class="swatch-grid" id="bodySwatches"></div>

                <p class="garage-label">Rims</p>
                <div class="swatch-grid" id="rimSwatches"></div>

                <p class="garage-label">Reactor</p>
                <div class="swatch-grid" id="reactorSwatches"></div>

                <p class="garage-label">Finish</p>
                <div class="seg-control" id="finishControl"></div>
            </div>

            <button class="btn-primary" id="garageBackBtn">DONE</button>
        </div>
    </div>

    <!-- Settings menu -->
    <div id="menu" class="menu">
        <div class="menu-panel">
            <h1 class="title-sm">SETTINGS</h1>

            <div class="stg-toggles">
                <div class="stg-row">
                    <span class="stg-label">Minimap</span>
                    <button class="stg-toggle" id="minimapToggle">ON</button>
                </div>
                <div class="stg-row">
                    <span class="stg-label">Camera</span>
                    <div class="seg-control stg-seg" id="cameraControl"></div>
                </div>
                <div class="stg-row">
                    <span class="stg-label">Laps</span>
                    <div class="seg-control stg-seg" id="lapsControl"></div>
                </div>
                <div class="stg-row">
                    <span class="stg-label">FPS + Version</span>
                    <button class="stg-toggle" id="debugToggle">OFF</button>
                </div>
            </div>

            <button class="btn-secondary" id="menuBackBtn">← Home</button>
        </div>
    </div>

    <!-- Rotate-to-landscape hint (portrait only, tap to dismiss) -->
    <div id="rotateHint">
        <span class="rotate-icon">↻</span>
        <span>Rotate to landscape for the best view &middot; tap to hide</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
